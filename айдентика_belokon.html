<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Владислава Белокон | Айдентика</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2C455B;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Фиксированный фон */
        .fixed-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #213242;
            z-index: -2;
        }

        /* HEADER - закреплённый */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 67px;
            background-color: #2C455B;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-container {
            display: flex;
            gap: 48px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* стили для ссылок-кнопок (полностью повторяют поведение .nav-btn) */
        .nav-link {
            font-family: 'Manrope', sans-serif;
            font-weight: 400;
            font-size: 16pt;
            color: #C5C7CB;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease;
            white-space: nowrap;
        }

        .nav-link:hover {
            color: #DDFF00;
        }

        /* Основной контент с отступом сверху под шапку */
        .content {
            flex: 1;
            margin-top: 67px; /* Отступ под фиксированную шапку */
            position: relative;
        }

        /* Контейнер для абсолютно позиционированных элементов с явной высотой */
        .abs-container {
            position: relative;
            min-height: calc(2900px); /* Высота под все элементы */
        }

        .center-img {
            display: block;
            margin-left: auto;
            margin-right: auto;
        }


        /* Кнопка "хочу!" — стили полностью из КОДА 2 */
        .want-button-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -180px;
            margin-bottom: 80px;
        }

        .want-btn {
            width: 615px;
            height: 95px;
            background-color: #8C9935;
            border-radius: 45px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            cursor: pointer;
            transition: box-shadow 0.2s ease-in-out;
            position: relative;
        }

        .want-btn span {
            font-family: 'Manrope', sans-serif;
            font-weight: 400;
            font-size: 72px;
            color: #FFFFFF;
            margin-top: 5px;
            line-height: 1;
        }

        .want-btn:hover {
            box-shadow: 10px 10px 0 #DDFF00;
        }

        /* ФУТЕР — прижат к низу */
        .footer {
            width: 100%;
            height: 67px;
            background-color: #D9D9D9;
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: auto;
        }

        .footer span {
            opacity: 1;
            pointer-events: none;
        }

        .footer-text {
            font-family: 'Manrope', sans-serif;
            font-weight: 400;
            font-size: 16pt;
            color: #2C455B;
            text-align: center;
            opacity: 1;
        }

        /* Адаптивность */
        @media (max-width: 1200px) {
            .about-text, .year-text, .edu-text {
                position: relative;
                left: auto;
                top: auto;
                margin: 20px auto;
                text-align: center;
                max-width: 90%;
            }
            
            .about-text {
                margin-top: 900px;
            }
            
            .contacts-card {
                position: relative;
                top: auto;
                margin: 40px auto;
            }
            
            .empty-rect {
                display: none;
            }

            .want-btn {
                width: 90%;
                max-width: 615px;
                height: auto;
                min-height: 95px;
            }
            
            .want-btn span {
                font-size: clamp(40px, 10vw, 72px);
                margin-top: 30px;
                margin-bottom: 20px;
            }
        }

        @media (max-width: 768px) {
            .nav-container {
                gap: 15px;
                padding: 0 10px;
            }
            
            .nav-link {
                font-size: 12pt;
                white-space: nowrap;
            }

            .want-btn span {
                margin-top: 25px;
                font-size: 48px;
            }
            
            .want-btn {
                min-height: 85px;
            }
        }
    </style>
</head>
<body>

<div class="fixed-header">
    <div class="nav-container">
        <!-- ССЫЛКИ вместо кнопок: ведут на указанные файлы в той же папке -->
        <a href="главная_belokon.html" class="nav-link">ОБО МНЕ</a>
        <a href="айдентика_belokon.html" class="nav-link">АЙДЕНТИКА</a>
        <a href="живопись_belokon.html" class="nav-link">ЖИВОПИСЬ</a>
        <a href="моделирование_belokon.html" class="nav-link">МОДЕЛИРОВАНИЕ</a>
        <a href="анкета_belokon.html" class="nav-link">ЗАПОЛНИТЬ АНКЕТУ</a>
    </div>
</div>

<div class="fixed-bg"></div>

<div class="content">
    <div class="abs-container">
        <img src="img/belokon/adt_belokon.svg" alt="adt" style="position: absolute; top: 329px; left: 50%; transform: translateX(-50%);">
        <img src="img/belokon/айдентика_belokon.svg" alt="айдентика" style="position: absolute; top: 870px; left: 50%; transform: translateX(-50%);">
    </div>

    <div class="want-button-wrapper">
        <div class="want-btn">
            <a href="анкета_belokon.html" class="want-btn">
                <span>хочу!</span>
            </a>
        </div>
    </div>
</div>

<div class="footer">
    <div class="footer-text">2026. Владислава Белокон</div>
</div>

</body>
</html>
